
// This is a config file for the Display Stream Compression model
// This config file may be used when running in "DSC 1.1 mode"

SRC_LIST			test_list.txt
DSC_VERSION_MINOR	1			// DSC 1.1 mode

FUNCTION  0   // 0=encode/decode (no bitstream out), 1=encode only, 2=decode only

//SLICE_WIDTH   480
SLICE_HEIGHT   108 // To set to one slice per picture, comment out this line

LINE_BUFFER_BPC    9
SIMPLE_422     0     // Enables DSC1.1 4:2:2 mode (upsample to 4:4:4 and discard samples at decoder)

USE_YUV_INPUT  0     // !! Must be = 1 if 4:2:2 enabled
BLOCK_PRED_ENABLE    1 // To disable block prediction, set this to 0
VBR_ENABLE     0     // Set to 1 for VBR mode


//  DPX read options (the following work well for most modes for GM/IM, some anomalies are autodetected)
DPXR_PAD_ENDS      1   // Pad to 32-bit boundaries 
DPXR_DATUM_ORDER   1
DPXR_FORCE_BE      0
SWAP_R_AND_B  1

//  DPX write options (the following work well for most modes for GM/IM)
DPXW_PAD_ENDS      1   // Required to output RGB to XNView 1.99 (but not YUV!)
DPXW_DATUM_ORDER   1
DPXW_FORCE_PACKING 1   // Method to use for 10 & 12-bit data
SWAP_R_AND_B_OUT   1
PPM_FILE_OUTPUT 0	// Output PPM files


//  Select the RC settings file based on the BPC & BPP above:
INCLUDE    rc_8bpc_12bpp.cfg
//INCLUDE    rc_10bpc_12bpp.cfg
//INCLUDE    rc_12bpc_12bpp.cfg
//INCLUDE    rc_8bpc_8bpp.cfg
//INCLUDE    rc_10bpc_8bpp.cfg
//INCLUDE    rc_12bpc_8bpp.cfg

//BITS_PER_PIXEL   12    // Override bpp from RC file (see "important note" above for 4:2:0 mode)

